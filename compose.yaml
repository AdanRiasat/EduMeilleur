name: 'edumeilleur'

services:
  db:
    image: postgres:18-alpine
    env_file: '.env'
    environment:
      POSTGRES_USER: '${EDUMEILLEUR_POSTGRES_USER:?Add to .env}'
      POSTGRES_PASSWORD: '${EDUMEILLEUR_POSTGRES_PASSWORD:?Add to .env}'
      POSTGRES_DB: '${EDUMEILLEUR_POSTGRES_DATABASE:?Add to .env}'
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
  
  api:
    build:
      context: ./EduMeilleurAPI
    env_file: '.env'
    environment:
      ConnectionStrings__DefaultConnection: "Host=${EDUMEILLEUR_POSTGRES_HOST};Port=5432;Database=${EDUMEILLEUR_POSTGRES_DATABASE};Username=${EDUMEILLEUR_POSTGRES_USER};Password=${EDUMEILLEUR_POSTGRES_PASSWORD}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports: 
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg-data:

    
