name: 'edumeilleur'

services:
  db:
    image: postgres:18-alpine
    env_file: '.env'
    environment:
      POSTGRES_USER: '${EDUMEILLEUR_POSTGRES_USER:?Add to .env}'
      POSTGRES_PASSWORD: '${EDUMEILLEUR_POSTGRES_PASSWORD:?Add to .env}'
      POSTGRES_DB: '${EDUMEILLEUR_POSTGRES_DATABASE:?Add to .env}'
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EDUMEILLEUR_POSTGRES_USER} -d ${EDUMEILLEUR_POSTGRES_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  
  api:
    build:
      context: ./EduMeilleurAPI
    env_file: '.env'
    environment:
      ConnectionStrings__EduMeilleurAPIContext: "Host=${EDUMEILLEUR_POSTGRES_HOST};Port=5432;Database=${EDUMEILLEUR_POSTGRES_DATABASE};Username=${EDUMEILLEUR_POSTGRES_USER};Password=${EDUMEILLEUR_POSTGRES_PASSWORD}"
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./eduMeilleur
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports: 
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro,Z
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  migrator:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /src
    volumes:
      - ./EduMeilleurAPI:/src:Z
    env_file: .env
    environment:
      ConnectionStrings__EduMeilleurAPIContext: "Host=db;Port=5432;Database=${EDUMEILLEUR_POSTGRES_DATABASE};Username=${EDUMEILLEUR_POSTGRES_USER};Password=${EDUMEILLEUR_POSTGRES_PASSWORD}"
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -lc "
        dotnet tool install --global dotnet-ef &&
        export PATH=$PATH:/root/.dotnet/tools &&
        dotnet restore EduMeilleurAPI.sln &&
        dotnet ef database update --project EduMeilleurAPI/EduMeilleurAPI.csproj --startup-project EduMeilleurAPI/EduMeilleurAPI.csproj
      "

volumes:
  pg-data:

    
