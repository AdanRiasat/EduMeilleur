<div class="auth-container">
  <div class="left-side">
    <div id="auth-logo">
      <img src="logo.png" width="75px" height="75px" [routerLink]="['']" />
    </div>

    <div class="signup-forms">
      <h2>Sign up</h2>
      <div class="progression-bar">
        <div class="progression-fill" [style.width.%]="progressPercent()"></div>
      </div>

      <form>
        <app-sign-up-main [formGroup]="formGroupMain" (next)="goToSecondPage()" *ngIf="isFirstPage()"></app-sign-up-main>
        <app-sign-up-extra [formGroup]="formGroupExtra" (back)="goToFirstPage()" (register)="register()" *ngIf="!isFirstPage()"></app-sign-up-extra>
      </form>
    </div>
  </div>

  <div class="right-side"></div>
</div>
