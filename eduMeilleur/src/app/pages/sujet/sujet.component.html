<div class="container-fluid">
    <div class="row">
        <div id="sujet-sidebar" class="col-2 scroll-sidebar">

            <app-subject-sidebar [subject]="sujet" [chapters]="chapters" [allItems]="allItems"
                [currentItem]="currentItem" (getAllItems)="getAllItems($event)"
                (getCurrentItem)="getCurrentItem($event)"></app-subject-sidebar>

        </div>


        <div class="col scroll-content" *ngIf="currentItem && currentItem.content != null">
            <div [innerHTML]="sujetService.selectedContent()"></div>
        </div>
    </div>
</div>
