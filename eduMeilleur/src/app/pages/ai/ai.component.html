<div class="ai-page d-flex flex-column">
  <div class="row g-0">
    <div id="ai-sidebar" class="col-2 side-bar border-end vh-100 d-flex flex-column">
      <!-- Chat Header -->
      <app-chatbot-sidebar [selectedModel]="aiService.selectedModel()"
        (selectedModelChange)="aiService.selectedModel.set($event)" [chats]="chats()" [currentChat]="currentChat()"
        [dropdownOpen]="dropdownOpen()" (newChat)="aiService.newChat()" (getMessages)="getMessages($event)"
        (toggleDropdown)="aiService.toggleDropdown($event)"
        (openDeleteModal)="aiService.openDeleteModal($event)"></app-chatbot-sidebar>
    </div>

    <div class="col message-area">
      <div class="card flex-grow-1 overflow-hidden">
        <!-- Messages container with fixed height and scroll -->
        <div id="scrollContainer" class="card-body chat-messages p-4" #scrollContainer>
          <div *ngIf="!currentChat()"
            class="w-100 h-100 d-flex justify-content-center align-items-center position-absolute top-0 start-0 bg-white">
            <div class="text-center text-muted">
              <i class="bi bi-chat-dots" style="font-size: 3rem"></i>
              <p class="mt-3 fs-5">Send a message to start a new chat</p>
            </div>
          </div>

          <div class="message-list">
            <div *ngFor="let m of messages()">
              <div *ngIf="m.isUser">
                <div class="message user-message mb-3">
                  <div class="message-content">
                    <div class="message-text">
                      {{ m.text }}
                    </div>
                    <div class="message-time">
                      <small class="text-muted">{{ m.timeStamp | date : "short" }}</small>
                    </div>
                  </div>
                </div>
              </div>

              <div *ngIf="!m.isUser">
                <div class="message bot-message mb-3">
                  <div class="message-content">
                    <div class="message-text" [innerHTML]="formatMessage(m.text)"></div>
                    <div class="message-time">
                      <small class="text-muted">{{ m.timeStamp | date : "short" }}</small>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div *ngIf="isLoading && loadingId == currentChat()!.id" class="mb-3">
              <img width="20px" src="favicon.ico" class="rotate-scale-up">
            </div>
          </div>
        </div>
      </div>

      <!-- Message Input Area -->
      <div class="card border-0 shadow-sm input-card">
        <div class="input-group">
          <input id="message-input" type="text" class="form-control" placeholder="Type your message..."
            name="userMessage" [(ngModel)]="userMessage" (keydown.enter)="sendMessage()" />
          <button class="btn" type="button" (click)="sendMessage()"><i class="bi bi-send"></i> Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<app-modal modalId="deleteChatModal" title="Delete Chat" body="Are you sure you want to delete this chat?"
  confirmText="Delete" (confirmed)="deleteChat()"> </app-modal>

<app-modal modalId="error500Modal" title="Something went wrong"
  body="Our servers are currently having issues, please try again later" cancelText="Ok" confirmText="Try again"
  (confirmed)="ngOnInit()"></app-modal>

<app-modal modalId="errorConnectionModal" title="Must be logged in" body="Please log in or create an account"
  cancelText="Cancel" confirmText="Log in" (confirmed)="redirectLogin()"></app-modal>
