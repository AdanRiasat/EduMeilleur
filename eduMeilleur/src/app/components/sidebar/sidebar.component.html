<div class="sidebar" [class.open]="isOpen">
  <div class="sidebar-header">
    <h3>Welcome to ÉduMeilleur!</h3>
    <button class="btn-close btn-close-white" (click)="closeSidebar()"></button>
  </div>

  <div class="sidebar-content-wrapper">
    <div class="extra-sidebars">
      <button class="btn-home" *ngIf="router.url == '/ai' && activeSidebarContent != 'chatbot'" (click)="openChatbotSidebar()">Chatbot sidebar</button>
      <button class="btn-home" *ngIf="hasSubjectId() && activeSidebarContent != 'subject'" (click)="openSubjectSidebar()">Subject sidebar</button>
      <button class="btn-home" *ngIf="activeSidebarContent != 'base'" (click)="openBaseSidebar()">Base sidebar</button>
    </div>

    <div class="base-sidebar" *ngIf="activeSidebarContent == 'base'">
      <div class="sidebar-body">
        <ul (click)="closeSidebar()">
          <li><a [routerLink]="['/home']">Accueil</a></li>
          <li><a [routerLink]="['/sujets']">Sujets</a></li>
          <li><a [routerLink]="['/ai']">Chatbot</a></li>
          <li><a (click)="modalService.openModal('ExploreDevModal')">Explore</a></li>
          <li><a [routerLink]="['/contactUs']">Contacter Nous</a></li>
        </ul>

        <div class="horizontal-line"></div>

        <ul (click)="closeSidebar()">
          <div *ngIf="!userService.isLoggedIn()">
            <li><a [routerLink]="['/login']">Log in</a></li>
            <li><a [routerLink]="['/signup']">Sign up</a></li>
          </div>
          <div *ngIf="userService.isLoggedIn()">
            <li><a [routerLink]="['/profile']">Profile</a></li>
            <li><a (click)="openDisconnectModal()">Log out</a></li>
          </div>
        </ul>

        <div>
          <select id="lang" name="lang">
            <option value="english">EN</option>
            <option value="french">FR</option>
          </select>
        </div>
      </div>
    </div>

    <div class="subject-sidebar-content" *ngIf="activeSidebarContent === 'subject'">
      <app-subject-sidebar [subject]="subject" [chapters]="chapters" [allItems]="allItems" [currentType]="subjectService.currentType()" [currentItemId]="subjectService.currentItemId()" (getAllItems)="getAllItems($event)" (getCurrentItem)="getCurrentItem($event)"></app-subject-sidebar>
    </div>

    <div class="chatbot-sidebar-content" *ngIf="activeSidebarContent === 'chatbot'">
      <app-chatbot-sidebar [isMobileSidebar]="sidebarStateService.isMobileSidebar" [selectedModel]="aiService.selectedModel()" (selectedModelChange)="aiService.selectedModel.set($event)" [chats]="aiService.chats()" [currentChat]="aiService.currentChat()" [dropdownOpen]="aiService.dropdownOpen()" (newChat)="aiService.newChat()" (getMessages)="getMessages($event)" (toggleDropdown)="aiService.toggleDropdown($event)" (openDeleteModal)="aiService.openDeleteModal($event)"></app-chatbot-sidebar>
    </div>
  </div>
</div>

<div *ngIf="isOpen" class="sidebar-overlay" (click)="closeSidebar()"></div>
