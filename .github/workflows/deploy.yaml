name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login to GHCR
      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 3. Enable multi-arch
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build & push API
      - name: Build and push API
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ghcr.io/adanriasat/edumeilleur/api:latest \
            -t ghcr.io/adanriasat/edumeilleur/api:${{ github.sha }} \
            --push ./EduMeilleurAPI

      # 5. Build & push Frontend
      - name: Build and push Frontend
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ghcr.io/adanriasat/edumeilleur/frontend:latest \
            -t ghcr.io/adanriasat/edumeilleur/frontend:${{ github.sha }} \
            --push ./eduMeilleur

      # 6. Deploy via SSH
      - name: Deploy to Raspberry Pi
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            cd ~/edumeilleur
            docker compose pull
            docker compose up -d