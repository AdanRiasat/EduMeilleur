name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --provenance=false \
            -t ghcr.io/adanriasat/edumeilleur/api:latest \
            -t ghcr.io/adanriasat/edumeilleur/api:${{ github.sha }} \
            --push ./EduMeilleurAPI

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Frontend
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --provenance=false \
            -t ghcr.io/adanriasat/edumeilleur/frontend:latest \
            -t ghcr.io/adanriasat/edumeilleur/frontend:${{ github.sha }} \
            --push ./eduMeilleur

  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]

    steps:
      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailscale
        run: sudo tailscale up --authkey=${{ secrets.TS_AUTHKEY }}

      - name: Deploy to Raspberry Pi
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          script: |
            cd ~/git/EduMeilleur
            docker compose pull
            docker compose up -d